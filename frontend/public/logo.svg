<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- SAIL Logo - Replace this SVG with your custom logo -->
  <!-- This is a placeholder that AI tools can easily replace -->

  <!-- Sail Icon -->
  <g transform="translate(4, 4)">
    <!-- Boat hull -->
    <path d="M4 32 L36 32 L32 40 L8 40 Z" fill="currentColor" opacity="0.9"/>
    <!-- Main sail -->
    <path d="M20 4 L20 30 L6 30 Z" fill="url(#sailGradient)"/>
    <!-- Secondary sail -->
    <path d="M22 8 L22 28 L34 28 Z" fill="currentColor" opacity="0.6"/>
    <!-- Mast -->
    <rect x="19" y="2" width="2" height="32" fill="currentColor" opacity="0.8"/>
  </g>

  <!-- SAIL Text -->
  <text x="52" y="34" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="currentColor">
    SAIL
  </text>

  <!-- Starter Kit Text -->
  <text x="118" y="34" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="400" fill="currentColor" opacity="0.7">
    Starter Kit
  </text>

  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="sailGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:currentColor;stop-opacity:1" />
      <stop offset="100%" style="stop-color:currentColor;stop-opacity:0.7" />
    </linearGradient>
  </defs>
</svg>
